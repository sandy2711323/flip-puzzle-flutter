name: flip_puzzle_flutter
description: A cross-platform Flutter emoji flip puzzle game.
publish_to: 'none'
version: 1.0.4+5

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/brand/
    - assets/sounds/bg_music.wav
    - assets/sounds/match.wav
    - assets/sounds/mismatch.wav