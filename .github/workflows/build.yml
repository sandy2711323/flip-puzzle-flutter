name: Build Flutter App

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "BUILD_*.bat"

  workflow_dispatch:
    inputs:
      platform:
        description: "What do you want to build?"
        required: true
        default: "web"
        type: choice
        options:
          - web
          - android
          - windows
          - all

      android_output:
        description: "Android output type"
        required: true
        default: "both"
        type: choice
        options:
          - apk
          - aab
          - both

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: flutter-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    name: Build and Deploy Web
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'web' ||
      github.event.inputs.platform == 'all'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get packages
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release --base-href "/flip-puzzle-flutter/"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    if: |
      github.event.inputs.platform == 'android' ||
      github.event.inputs.platform == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get packages
        run: flutter pub get

      - name: Build Android APK
        if: |
          github.event.inputs.android_output == 'apk' ||
          github.event.inputs.android_output == 'both'
        run: flutter build apk --release

      - name: Build Android AAB
        if: |
          github.event.inputs.android_output == 'aab' ||
          github.event.inputs.android_output == 'both'
        run: flutter build appbundle --release

      - name: Upload APK Artifact
        if: |
          github.event.inputs.android_output == 'apk' ||
          github.event.inputs.android_output == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 15

      - name: Upload AAB Artifact
        if: |
          github.event.inputs.android_output == 'aab' ||
          github.event.inputs.android_output == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 15

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    if: |
      github.event.inputs.platform == 'windows' ||
      github.event.inputs.platform == 'all'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Get packages
        run: flutter pub get

      - name: Build Windows
        shell: cmd
        run: |
          set CL=/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
          flutter build windows --release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release
          retention-days: 15